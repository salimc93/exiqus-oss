# Docker Compose for GitHub Analyzer production-like environment
#
# Secrets are supplied via environment variables. Copy
# docker-compose.env.example to .env (or pass --env-file) and fill in
# real values before running `docker compose up`.
#
# For local development, `docker compose up -d postgres redis` works with
# zero configuration - the database/cache passwords fall back to dev-only
# defaults that match the app's default DATABASE_URL. The app container's
# SECRET_KEY / JWT_SECRET_KEY are always required.

services:
  # Main application service
  github-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8000:8000"
    environment:
      # Application configuration
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      
      # Required API keys (MUST be set for health check to pass)
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      
      # Database configuration
      - DATABASE_URL=postgresql://github_analyzer:${POSTGRES_PASSWORD:-exiqus_dev_password}@postgres:5432/github_analyzer

      # Redis configuration
      - REDIS_URL=redis://:${REDIS_PASSWORD:-exiqus_dev_password}@redis:6379/0

      # Security configuration
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Set JWT_SECRET_KEY}
      
      # API configuration
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW=60
      
      # Monitoring
      - ENABLE_METRICS=true
      - METRICS_PORT=9090
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - github-analyzer-network

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=github_analyzer
      - POSTGRES_USER=github_analyzer
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-exiqus_dev_password}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U github_analyzer -d github_analyzer"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - github-analyzer-network

  # Redis cache and session store
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-exiqus_dev_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-exiqus_dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - github-analyzer-network

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - github-analyzer
    restart: unless-stopped
    networks:
      - github-analyzer-network

  # Monitoring with Prometheus (optional)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - github-analyzer-network

  # Grafana for metrics visualization (optional)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?Set GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - github-analyzer-network

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_data:
    driver: local
  app_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# Network for service communication
networks:
  github-analyzer-network:
    driver: bridge