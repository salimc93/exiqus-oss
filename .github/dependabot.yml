version: 2

# test_repos/ holds deliberately outdated fixture projects used to exercise
# the analyzer (an abandoned Flask app, a tutorial copy-paste repo, and so
# on). Their stale dependencies are the point, so they are not listed here
# and Dependabot leaves them alone.

updates:
  # Backend (Poetry) - root pyproject.toml only
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    groups:
      # One PR for routine bumps. Majors stay separate so a breaking
      # change is never buried in a batch of fifteen.
      backend-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # Frontend (npm)
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    ignore:
      # TypeScript 7 is the native Go port (Corsa). It does not yet expose the
      # programmatic API that Next.js calls to run its type-check step, so
      # `next build` reports TypeScript as "not installed" even though it is.
      # The TypeScript team lists the API as "not ready" in the port's own
      # status matrix. Revisit once that lands and Next.js supports it; until
      # then a weekly PR for it is pure noise.
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
    groups:
      # Batch routine dev-tooling bumps into one PR rather than many
      dev-dependencies:
        dependency-type: development
      frontend-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  # Keep the Actions in the workflows current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
