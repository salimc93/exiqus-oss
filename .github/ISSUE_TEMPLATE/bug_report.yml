name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        For security vulnerabilities, please use private vulnerability
        reporting (Security tab) instead of a public issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run '...'
        2. Call endpoint '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Backend (FastAPI)
        - Frontend (Next.js)
        - Analysis engine / AI
        - Database / migrations
        - Docker / deployment
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Python version, Node version, how you're running it (docker compose / local)
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output (redact secrets!).
      render: shell
